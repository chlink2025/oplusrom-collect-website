<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPlus ROM 下载站</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        h1, h2, h3 { color: #333; }
        #search { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .item { cursor: pointer; padding: 12px; border: 1px solid #ddd; margin: 8px 0; border-radius: 4px; background: #f9f9f9; }
        .item:hover { background: #e8f0fe; }
        #back { display: none; margin: 15px 0; padding: 10px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #back:hover { background: #3367d6; }
        #loading { display: none; color: #666; font-style: italic; margin: 10px 0; }
        #devices, #versions, #link { margin-bottom: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; word-break: break-all; }
    </style>
</head>
<body>
    <h1>OPlus ROM 下载站</h1>
    <input id="search" type="text" placeholder="搜索设备（支持中文/英文）...">

    <button id="back">返回上一级</button>

    <div id="loading">加载中...</div>

    <div id="devices"></div>
    <div id="versions"></div>
    <div id="link"></div>

    <script>
        const repo = 'chlink2025/oplusrom';  // 固定使用原仓库
        const branch = 'main';
        const baseApi = `https://api.github.com/repos/${repo}/contents/links`;
        const baseRaw = `https://raw.githubusercontent.com/${repo}/${branch}/links`;

        let currentDevice = null;
        let currentVersion = null;
        let allDevices = [];

        // 显示/隐藏 loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // 统一显示 section（替换式：只显示当前层级）
        function showSection(section) {
            document.getElementById('devices').style.display = 'none';
            document.getElementById('versions').style.display = 'none';
            document.getElementById('link').style.display = 'none';

            document.getElementById(section).style.display = 'block';
            document.getElementById('back').style.display = section === 'devices' ? 'none' : 'block';
        }

        // 更新 URL 路徑（不重新加載頁面）
        function updateUrl(path) {
            history.pushState({ path }, '', path);
        }

        // 從 URL 路徑解析並加載內容
        function handleRoute() {
            const path = window.location.pathname.substring(1);  // 去掉開頭 /
            const parts = path.split('/').filter(p => p);

            if (parts.length === 0) {
                // 根路徑：顯示設備列表
                loadDevices();
            } else if (parts.length === 1) {
                // /設備名：顯示版本列表
                currentDevice = decodeURIComponent(parts[0]);
                loadVersions(currentDevice);
            } else if (parts.length === 2) {
                // /設備名/版本名：顯示連結
                currentDevice = decodeURIComponent(parts[0]);
                currentVersion = decodeURIComponent(parts[1]);
                loadLink(currentVersion);
            } else {
                // 無效路徑：重定向到根
                updateUrl('/');
                loadDevices();
            }
        }

        // 監聽 popstate 事件（瀏覽器後退/前進）
        window.addEventListener('popstate', handleRoute);

        // 加载设备列表
        async function loadDevices() {
            showLoading(true);
            try {
                const res = await fetch(`${baseApi}?ref=${branch}`);
                if (!res.ok) throw new Error(`设备列表加载失败: ${res.status}`);
                const data = await res.json();
                allDevices = data.filter(item => item.type === 'dir').map(item => item.name);
                renderDevices(allDevices);
                showSection('devices');
            } catch (err) {
                console.error(err);
                document.getElementById('devices').innerHTML = `<p style="color:red;">${err.message}（请检查网络或 GitHub 限速）</p>`;
            } finally {
                showLoading(false);
            }
        }

        function renderDevices(devices) {
            const container = document.getElementById('devices');
            container.innerHTML = '';
            devices.forEach(device => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = device;
                div.onclick = () => {
                    updateUrl(`/${encodeURIComponent(device)}`);
                    loadVersions(device);
                };
                container.appendChild(div);
            });
        }

        // 加载版本列表
        async function loadVersions(device) {
            currentDevice = device;
            showLoading(true);
            try {
                const res = await fetch(`${baseApi}/${encodeURIComponent(device)}?ref=${branch}`);
                if (!res.ok) throw new Error(`版本列表加载失败: ${res.status}`);
                const data = await res.json();
                const versions = data.filter(item => item.name.endsWith('.txt'))
                                     .map(item => item.name.replace('.txt', ''));
                renderVersions(versions);
                showSection('versions');
            } catch (err) {
                console.error(err);
                document.getElementById('versions').innerHTML = `<p style="color:red;">${err.message}</p>`;
            } finally {
                showLoading(false);
            }
        }

        function renderVersions(versions) {
            const container = document.getElementById('versions');
            container.innerHTML = `<h2>${currentDevice} 可用版本</h2>`;
            versions.forEach(version => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = version;
                div.onclick = () => {
                    updateUrl(`/${encodeURIComponent(currentDevice)}/${encodeURIComponent(version)}`);
                    loadLink(version);
                };
                container.appendChild(div);
            });
        }

        // 複製函數
        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const tip = btnElement.nextElementSibling;
                if (tip) {
                    tip.style.display = 'inline';
                    setTimeout(() => tip.style.display = 'none', 2000);
                }
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動複製');
            });
        }

        // 加载并显示链接（替换版本列表）
        async function loadLink(version) {
            currentVersion = version;
            const txtPath = `${currentDevice}/${version}.txt`;
            const rawUrl = `${baseRaw}/${encodeURIComponent(txtPath)}`;
            showLoading(true);
            try {
                const res = await fetch(rawUrl);
                if (!res.ok) throw new Error(`链接文件加载失败: ${res.status}`);
                const link = (await res.text()).trim(); // 第一行内容，即链接

                console.log('[DEBUG] 版本:', version);
                console.log('[DEBUG] 原始 TXT 链接:', link);

                let content = `<h2>${currentDevice} - ${version}</h2>`;
                let processedLink = link;  // 默认 fallback

                const urlObj = new URL(link);
                const pathLower = urlObj.pathname.toLowerCase();

                console.log('[DEBUG] pathname:', urlObj.pathname);
                console.log('[DEBUG] pathname (小写):', pathLower);
                console.log('[DEBUG] 是否包含 downloadcheck:', pathLower.includes('downloadcheck'));

                if (pathLower.includes('downloadcheck')) {
                    console.log('[DEBUG] 检测到 downloadcheck 在路径中，进入 proxy 处理');

                    const encodedLink = btoa(link);
                    console.log('[DEBUG] Base64 编码后:', encodedLink);

                    const proxyUrl = `/proxy?url=${encodedLink}`;
                    console.log('[DEBUG] 即将发送 proxy 请求:', proxyUrl);

                    try {
                        const proxyRes = await fetch(proxyUrl);
                        console.log('[DEBUG] proxy 响应状态码:', proxyRes.status);

                        if (proxyRes.ok) {
                            const text = await proxyRes.text();
                            console.log('[DEBUG] proxy 返回内容:', text);
                            processedLink = text;
                        } else {
                            console.log('[DEBUG] proxy 非 200 状态，使用原始链接');
                        }
                    } catch (fetchErr) {
                        console.error('[DEBUG] fetch proxy 发生错误:', fetchErr);
                    }
                } else {
                    console.log('[DEBUG] 未检测到 downloadcheck 路径，跳过 proxy 请求');
                }

                // 根据 processedLink 是否变化来决定显示方式
                if (processedLink !== link) {
                    content += `
                        <div class="link-container">
                            <h3>原始链接</h3>
                            <pre id="raw-${version}">${link}</pre>
                            <button class="copy-btn" onclick="copyToClipboard(document.getElementById('raw-${version}').textContent, this)">复制</button>
                            <span class="copy-tip" style="display:none;">已複製！</span>
                        </div>
                        <div class="link-container">
                            <h3>处理后链接（已触发 302 重定向）</h3>
                            <pre id="processed-${version}">${processedLink}</pre>
                            <button class="copy-btn" onclick="copyToClipboard(document.getElementById('processed-${version}').textContent, this)">复制</button>
                            <span class="copy-tip" style="display:none;">已複製！</span>
                        </div>
                        <p style="color: green; margin-top: 15px;">已成功获取重定向后的下载链接</p>
                    `;
                } else {
                    content += `
                        <div class="link-container">
                            <h3>链接</h3>
                            <pre id="direct-${version}">${link}</pre>
                            <button class="copy-btn" onclick="copyToClipboard(document.getElementById('direct-${version}').textContent, this)">复制</button>
                            <span class="copy-tip" style="display:none;">已複製！</span>
                        </div>
                        <p style="color: orange; margin-top: 15px;">未检测到重定向或处理未成功，使用原始链接</p>
                    `;
                }

                content += `
                    <p style="color: #666; margin-top: 20px;">
                        下载提示：复制链接后，可用以下命令下载（推荐 curl 或 IDM）：<br>
                        <code>curl -H "userid: oplus-ota|" -O [链接]</code>
                    </p>
                `;

                document.getElementById('link').innerHTML = content;
                showSection('link');
            } catch (err) {
                console.error('[DEBUG] loadLink 整体错误:', err);
                document.getElementById('link').innerHTML = `<p style="color:red;">加载失败: ${err.message}</p>`;
            } finally {
                showLoading(false);
            }
        }

        // 返回上一级
        document.getElementById('back').onclick = function() {
            if (document.getElementById('link').style.display === 'block') {
                updateUrl(`/${encodeURIComponent(currentDevice)}`);
                showSection('versions');
            } else if (document.getElementById('versions').style.display === 'block') {
                updateUrl('/');
                showSection('devices');
            }
        };

        // 搜索
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderDevices(allDevices);
                return;
            }
            const filtered = allDevices.filter(d => d.toLowerCase().includes(query));
            renderDevices(filtered);
        });

        // 初始化：根據當前 URL 加載
        handleRoute();
    </script>
</body>
</html>
